<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 340px; margin: 0; font: 13px -apple-system, system-ui, sans-serif; color: #111; }
    header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid #eee; }
    header b { font-size: 14px; }
    #status { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    #status.ok { background: #dcfce7; color: #166534; }
    #status.off { background: #fee2e2; color: #991b1b; }
    .toggle { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid #eee; cursor: pointer; user-select: none; }
    .toggle input { margin: 0; }
    .toggle span { font-size: 12px; color: #333; }
    .section { padding: 10px 12px; border-bottom: 1px solid #eee; }
    .section .lbl { display: block; font-size: 12px; font-weight: 600; color: #333; margin-bottom: 6px; }
    .section textarea { width: 100%; box-sizing: border-box; resize: vertical; min-height: 160px;
      font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: #111; padding: 6px 8px;
      border: 1px solid #d4d4d8; border-radius: 6px; background: #fff; }
    .section textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .section .sub { margin-top: 5px; font-size: 11px; color: #777; line-height: 1.4; }
  </style>
</head>
<body>
  <header>
    <b>xDownload Manager</b>
    <span id="status" class="off">Chưa mở app</span>
  </header>
  <label class="toggle">
    <input type="checkbox" id="interceptAll" />
    <span>Chuyển mọi tải xuống sang xDownload Manager</span>
  </label>
  <div class="section">
    <label class="lbl" for="excluded">Định dạng KHÔNG gửi sang app</label>
    <textarea id="excluded" rows="2" placeholder="jpg, png, gif…"></textarea>
    <div class="sub">Tệp có các đuôi này sẽ tải bằng trình duyệt (mặc định: ảnh). Ngăn cách bằng dấu phẩy hoặc khoảng trắng.</div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
