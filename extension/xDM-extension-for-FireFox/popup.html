<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <style>
    /* Theme-aware: light mặc định, tự đổi tối theo trình duyệt. color-scheme để
       checkbox + scrollbar + viền textarea cũng đổi tông theo. */
    :root {
      color-scheme: light dark;
      --bg: #ffffff; --fg: #111827; --muted: #6b7280; --label: #333333;
      --border: #ededf0; --panel: #ffffff; --panel-border: #d4d4d8;
      --accent: #6366f1; --accent-ring: rgba(99,102,241,.18);
      --ok-bg: #dcfce7; --ok-fg: #166534;
      --off-bg: #fee2e2; --off-fg: #991b1b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1b1d22; --fg: #e9ebef; --muted: #9aa1ac; --label: #c9cdd5;
        --border: #2b2e35; --panel: #14161a; --panel-border: #3a3d45;
        --accent: #9a8bff; --accent-ring: rgba(154,139,255,.24);
        --ok-bg: rgba(34,197,94,.16); --ok-fg: #83e3ac;
        --off-bg: rgba(239,68,68,.16); --off-fg: #ff9d9d;
      }
    }
    body { width: 340px; margin: 0; font: 13px -apple-system, system-ui, sans-serif; color: var(--fg); background: var(--bg); }
    header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    header b { font-size: 14px; }
    #status { margin-left: auto; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    #status.ok { background: var(--ok-bg); color: var(--ok-fg); }
    #status.off { background: var(--off-bg); color: var(--off-fg); }
    .toggle { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    .toggle input { margin: 0; accent-color: var(--accent); }
    .toggle span { font-size: 12px; color: var(--label); }
    .section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .section .lbl { display: block; font-size: 12px; font-weight: 600; color: var(--label); margin-bottom: 6px; }
    .section textarea { width: 100%; box-sizing: border-box; resize: vertical; min-height: 160px;
      font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--fg); padding: 6px 8px;
      border: 1px solid var(--panel-border); border-radius: 6px; background: var(--panel); }
    .section textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
    .section .sub { margin-top: 5px; font-size: 11px; color: var(--muted); line-height: 1.4; }
  </style>
</head>
<body>
  <header>
    <b>xDownload Manager</b>
    <span id="status" class="off">Chưa mở app</span>
  </header>
  <label class="toggle">
    <input type="checkbox" id="interceptAll" />
    <span>Chuyển mọi tải xuống sang xDownload Manager</span>
  </label>
  <div class="section">
    <label class="lbl" for="excluded">Định dạng KHÔNG gửi sang app</label>
    <textarea id="excluded" rows="2" placeholder="jpg, png, gif…"></textarea>
    <div class="sub">Tệp có các đuôi này sẽ tải bằng trình duyệt (mặc định: ảnh). Ngăn cách bằng dấu phẩy hoặc khoảng trắng.</div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
